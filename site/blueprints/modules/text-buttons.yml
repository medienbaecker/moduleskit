title: Text with buttons
icon: text
tabs:
  content:
    fields:
      textarea: true
      buttons:
        type: structure
        fields:
          text:
            type: text
          link:
            type: url
  settings:
    fields:
      background:
        type: select
        translate: false
        options:
          light: Light
          dark: Dark
  another_tab:
    label: Another tab
    fields:
      info:
        type: info
        text: This is another tab with some info text. You can add as many tabs as you like!
  last_tab:
    label: Last tab
    fields:
      another_info:
        type: info
        text: This is the last tab. Tabs are optional, so you can also just have content without them.
